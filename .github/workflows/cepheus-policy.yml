# Generated by cepheus-build ci-policy. Do not edit by hand.
name: cepheus-policy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  centralization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product
        uses: actions/checkout@v7
        with:
          path: product
      - name: Checkout cepheus-build
        uses: actions/checkout@v7
        with:
          repository: CepheusLabs/cepheus-build
          ref: main
          path: cepheus-build
          token: ${{ secrets.CEPHEUS_READ_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Central toolchain pins
        run: python cepheus-build/bin/cepheus-build toolchain-pins --workspace-root "$GITHUB_WORKSPACE" --json
      - name: CI workflow policy
        run: python cepheus-build/bin/cepheus-build ci-policy --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Contract mirrors
        run: python cepheus-build/bin/cepheus-build contract-mirrors --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Dart lint policy
        run: python cepheus-build/bin/cepheus-build lint-policy --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Dependency baselines
        run: python cepheus-build/bin/cepheus-build dependency-pins --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Schema governance
        run: python cepheus-build/bin/cepheus-build schema-audit --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Runtime config governance
        run: python cepheus-build/bin/cepheus-build config-audit --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Dependency bot policy
        run: python cepheus-build/bin/cepheus-build dependency-bots --workspace-root "$GITHUB_WORKSPACE" --json
      - name: Repo-local build entrypoint erosion
        run: python cepheus-build/bin/cepheus-build build-scripts --workspace-root "$GITHUB_WORKSPACE" --json
